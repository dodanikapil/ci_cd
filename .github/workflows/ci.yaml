name : ci pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml
    - name: Check if YAML file exists
      run : |
        if [ -f "xrun.yaml" ]; then
          echo "xrun.yaml file exists."
        else
          echo "xrun.yaml file does not exist."
          exit 1
        fi
    - name: Run Python script
      run: |
        python read_yaml.py